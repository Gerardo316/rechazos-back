<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sistema de Gestión Back - Consola</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #0d0d0d;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Barra principal del sistema */
    .sys-header {
      width: 100%;
      height: 90px;
      background-color: #1a1a1a;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      box-sizing: border-box;
      border-bottom: 3px solid #e67e22;
      flex-shrink: 0;
    }

    .center-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    /* Leyenda personalizada */
    .sys-legend {
      background-color: #c0392b;
      color: white;
      padding: 2px 10px;
      border-radius: 3px;
      font-weight: bold;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      animation: blink 2.5s infinite;
    }

    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0.7; }
      100% { opacity: 1; }
    }

    .match-status {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .flag {
      width: 28px;
      height: 18px;
      border: 1px solid #555;
      border-radius: 2px;
    }

    .team-name {
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 15px;
    }

    .vs {
      color: #888;
      font-size: 13px;
    }

    .side-text {
      font-size: 13px;
      color: #aaa;
    }

    /* CONTENEDOR DE LA TRANSMISIÓN */
    .video-container {
      width: 100%;
      flex-grow: 1;
      position: relative;
      background-color: #000;
    }

    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <!-- BARRA DE SISTEMA MODIFICADA -->
  <div class="sys-header">
    <div class="side-text">Nivel de Red: EMISIÓN ESTABLE</div>
    
    <div class="center-panel">
      <!-- Tu leyenda personalizada -->
      <div class="sys-legend">⚠️ EL PARTIDO ESTÁ A PUNTO DE TRANSMISIÓN</div>
      
      <div class="match-status">
        <img src="https://flagcdn.com/w40/es.png" alt="España" class="flag">
        <span class="team-name">ESP</span>
        <span class="vs">vs</span>
        <span class="team-name">ARG</span>
        <img src="https://flagcdn.com/w40/ar.png" alt="Argentina" class="flag">
      </div>
    </div>

    <div class="side-text">Gestión de Back v3.1</div>
  </div>

  <!-- EL PARTIDO EN VIVO CON TU NUEVO ENLACE -->
  <div class="video-container">
    <iframe src="https://vdo.ninja/?view=zkJSEzn&autoplay=1&muted=0&transparent=0&cleanoutput=1&scale=100" 
            title="Transmisión del Sistema" 
            allow="autoplay; fullscreen; microphone; camera; display-capture">
    </iframe>
  </div>

</body>
</html>
