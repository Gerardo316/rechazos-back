<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sistema de Gestión Back - Consola</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #0d0d0d;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Barra principal del sistema */
    .sys-header {
      width: 100%;
      height: 90px;
      background-color: #1a1a1a;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      box-sizing: border-box;
      border-bottom: 3px solid #e67e22;
      flex-shrink: 0;
    }

    .center-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .sys-legend {
      background-color: #c0392b;
      color: white;
      padding: 2px 10px;
      border-radius: 3px;
      font-weight: bold;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .side-text {
      font-size: 13px;
      color: #aaa;
    }

    /* CONTENEDOR DEL VIDEO */
    .video-container {
      width: 100%;
      flex-grow: 1;
      position: relative;
      background-color: #000;
    }

    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <!-- BARRA SUPERIOR -->
  <div class="sys-header">
    <div class="side-text">Estado: EMISIÓN ACTIVA</div>
    
    <div class="center-panel">
      <div class="sys-legend">🔴 REPRODUCCIÓN EN VIVO / TRANSMISIÓN</div>
    </div>

    <div class="side-text">Gestión de Back v3.1</div>
  </div>

  <!-- EMBED DIRECTO DE YOUTUBE -->
  <div class="video-container">
    <iframe 
      src="https://www.youtube.com/embed/FgVoHbhSJPc?autoplay=1&rel=0" 
      title="Reproductor de Video" 
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
      allowfullscreen>
    </iframe>
  </div>

</body>
</html>
