<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Firma de Rechazos Back</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #e0e0e0;
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
    }
    header {
      background-color: #555;
      color: white;
      padding: 10px;
      text-align: center;
    }
    main {
      padding: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background-color: #f5f5f5;
    }
    th, td {
      border: 1px solid #999;
      padding: 8px;
      text-align: left;
    }
    th {
      background-color: #ccc;
    }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      background-color: #777;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background-color: #555;
    }
    #sync-container {
      display: none;
      height: 100vh;
      flex-direction: column;
    }
    /* Contenedor del buscador de YouTube (Mitad Superior) */
    #youtube-search-container {
      width: 100%;
      height: 50%;
      background-color: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-bottom: 3px solid #555;
    }
    #youtube-search-container h3 {
      color: #fff;
      margin-bottom: 15px;
      font-weight: normal;
      font-size: 18px;
    }
    .search-box {
      display: flex;
      width: 80%;
      max-width: 500px;
    }
    .search-box input {
      flex: 1;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 4px 0 0 4px;
      outline: none;
    }
    .search-box button {
      margin-top: 0;
      padding: 12px 20px;
      background-color: #cc0000;
      color: white;
      font-size: 16px;
      border: none;
      border-radius: 0 4px 4px 0;
      cursor: pointer;
    }
    .search-box button:hover {
      background-color: #990000;
    }
    /* Contenedor de Discord (Mitad Inferior) */
    #discord-container {
      width: 100%;
      height: 50%;
      background-color: #dcdcdc;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #discord-container button {
      padding: 15px 30px;
      background-color: #444;
      color: white;
      font-size: 16px;
      border-radius: 5px;
      border: none;
      cursor: pointer;
    }
    #discord-container button:hover {
      background-color: #222;
    }
  </style>
</head>
<body>
  <header id="header-corporativo">
    <h1>Firma de Rechazos Back</h1>
  </header>
  
  <main id="main-content">
    <h2>Tabla de Datos</h2>
    <table>
      <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Estado</th>
      </tr>
      <tr>
        <td>001</td>
        <td>Documento A</td>
        <td>Rechazado</td>
      </tr>
      <tr>
        <td>002</td>
        <td>Documento B</td>
        <td>Pendiente</td>
      </tr>
      <tr>
        <td>003</td>
        <td>Documento C</td>
        <td>Aprobado</td>
      </tr>
    </table>
    <button onclick="sincronizar()">Sincronizar Servidor</button>
  </main>

  <div id="sync-container">
    <!-- Mitad Superior: Buscador Directo de YouTube para evitar bloqueos -->
    <div id="youtube-search-container">
      <h3>Buscador del Sistema (Acceso YouTube)</h3>
      <div class="search-box">
        <input type="text" id="yt-query" placeholder="Escribe el video, canal o partido a buscar..." onkeydown="if(event.key === 'Enter') buscarYouTube()">
        <button onclick="buscarYouTube()">Buscar</button>
      </div>
    </div>
    
    <!-- Mitad Inferior: Botón de Discord -->
    <div id="discord-container">
      <button onclick="abrirDiscord()">Abrir Enlace de Transmisión (Puerto Seguro)</button>
    </div>
  </div>

  <script>
    function sincronizar() {
      document.getElementById('header-corporativo').style.display = 'none';
      document.getElementById('main-content').style.display = 'none';
      document.getElementById('sync-container').style.display = 'flex';
    }
    
    function buscarYouTube() {
      var query = document.getElementById('yt-query').value;
      if (query.trim() !== "") {
        // Redirige directamente a los resultados de búsqueda de YouTube de forma segura
        window.open("https://www.youtube.com/results?search_query=" + encodeURIComponent(query), "_blank");
      }
    }

    function abrirDiscord() {
      window.open("https://discord.com/channels/1525403677286862918/1525403716310667417", "_blank");
    }
  </script>
</body>
</html>
