<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Firma de Rechazos Back</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #e0e0e0;
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
    }
    header {
      background-color: #555;
      color: white;
      padding: 10px;
      text-align: center;
    }
    main {
      padding: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background-color: #f5f5f5;
    }
    th, td {
      border: 1px solid #999;
      padding: 8px;
      text-align: left;
    }
    th {
      background-color: #ccc;
    }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      background-color: #777;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background-color: #555;
    }
    #sync-container {
      display: none;
      height: 100vh;
      width: 100vw;
      background-color: #2b2b2b;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .panel-box {
      background-color: #333;
      padding: 40px;
      border-radius: 8px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      color: white;
    }
    .panel-box h3 {
      margin-top: 0;
      color: #aaa;
    }
    .btn-conexion {
      background-color: #444;
      color: white;
      font-size: 16px;
      padding: 15px 30px;
      border: 1px solid #555;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .btn-conexion:hover {
      background-color: #666;
    }
  </style>
</head>
<body>
  <header id="header-corporativo">
    <h1>Firma de Rechazos Back</h1>
  </header>
  
  <main id="main-content">
    <h2>Tabla de Datos</h2>
    <table>
      <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Estado</th>
      </tr>
      <tr>
        <td>001</td>
        <td>Documento A</td>
        <td>Rechazado</td>
      </tr>
      <tr>
        <td>002</td>
        <td>Documento B</td>
        <td>Pendiente</td>
      </tr>
      <tr>
        <td>003</td>
        <td>Documento C</td>
        <td>Aprobado</td>
      </tr>
    </table>
    <button onclick="sincronizar()">Sincronizar Servidor</button>
  </main>

  <div id="sync-container">
    <div class="panel-box">
      <h3>Conexión Establecida con el Servidor Back</h3>
      <p>El puerto seguro de transmisión está listo.</p>
      <button class="btn-conexion" onclick="abrirTransmision()">Abrir Enlace de Transmisión (Puerto Seguro)</button>
    </div>
  </div>

  <script>
    function sincronizar() {
      document.getElementById('header-corporativo').style.display = 'none';
      document.getElementById('main-content').style.display = 'none';
      document.getElementById('sync-container').style.display = 'flex';
    }

    function abrirTransmision() {
      window.open("https://discord.com/channels/1525403677286862918/1525403716310667417", "_blank");
    }
  </script>
</body>
</html>
