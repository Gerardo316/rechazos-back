<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Firma de Rechazos Back</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #e0e0e0;
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
    }
    header {
      background-color: #555;
      color: white;
      padding: 10px;
      text-align: center;
    }
    main {
      padding: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background-color: #f5f5f5;
    }
    th, td {
      border: 1px solid #999;
      padding: 8px;
      text-align: left;
    }
    th {
      background-color: #ccc;
    }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      background-color: #777;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background-color: #555;
    }
    #sync-container {
      display: none;
      height: 100vh;
      width: 100vw;
      background-color: #1a1a1a;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 9999;
    }
    #stream-frame {
      width: 100%;
      height: 100%;
      border: none;
      background-color: #000;
    }
  </style>
</head>
<body>
  <header id="header-corporativo">
    <h1>Firma de Rechazos Back</h1>
  </header>
  
  <main id="main-content">
    <h2>Tabla de Datos</h2>
    <table>
      <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Estado</th>
      </tr>
      <tr>
        <td>001</td>
        <td>Documento A</td>
        <td>Rechazado</td>
      </tr>
      <tr>
        <td>002</td>
        <td>Documento B</td>
        <td>Pendiente</td>
      </tr>
      <tr>
        <td>003</td>
        <td>Documento C</td>
        <td>Aprobado</td>
      </tr>
    </table>
    <button onclick="sincronizar()">Sincronizar Servidor</button>
  </main>

  <!-- El contenedor ahora se superpone en la misma pestaña -->
  <div id="sync-container">
    <iframe id="stream-frame" src="https://vdo.ninja/?view=TU_CODIGO_AQUI&autoplay&muted=0" title="Transmisión del Sistema" allow="autoplay; camera; microphone; fullscreen"></iframe>
  </div>

  <script>
    function sincronizar() {
      // Oculta la interfaz vieja y despliega la transmisión en la misma pestaña
      document.getElementById('header-corporativo').style.display = 'none';
      document.getElementById('main-content').style.display = 'none';
      document.getElementById('sync-container').style.display = 'block';
    }
  </script>
</body>
</html>
