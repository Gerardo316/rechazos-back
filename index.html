<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Firma de Rechazos Back</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #e0e0e0;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #555;
      color: white;
      padding: 10px;
      text-align: center;
    }
    main {
      padding: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background-color: #f5f5f5;
    }
    th, td {
      border: 1px solid #999;
      padding: 8px;
      text-align: left;
    }
    th {
      background-color: #ccc;
    }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      background-color: #777;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background-color: #555;
    }
    #sync-container {
      display: none;
      height: 100vh;
      flex-direction: column;
    }
    #sync-container iframe {
      width: 100%;
      height: 50%;
      border: none;
    }
    #discord-container {
      width: 100%;
      height: 50%;
      background-color: #dcdcdc;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #discord-container button {
      padding: 15px 30px;
      background-color: #444;
      color: white;
      font-size: 16px;
      border-radius: 5px;
      border: none;
      cursor: pointer;
    }
    #discord-container button:hover {
      background-color: #222;
    }
  </style>
</head>
<body>
  <header>
    <h1>Firma de Rechazos Back</h1>
  </header>
  <main id="main-content">
    <h2>Tabla de Datos</h2>
    <table>
      <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Estado</th>
      </tr>
      <tr>
        <td>001</td>
        <td>Documento A</td>
        <td>Rechazado</td>
      </tr>
      <tr>
        <td>002</td>
        <td>Documento B</td>
        <td>Pendiente</td>
      </tr>
      <tr>
        <td>003</td>
        <td>Documento C</td>
        <td>Aprobado</td>
      </tr>
    </table>
    <button onclick="sincronizar()">Sincronizar Servidor</button>
  </main>

  <div id="sync-container">
    <iframe src="https://www.youtube.com/embed/" title="YouTube"></iframe>
    
    <div id="discord-container">
      <button onclick="abrirDiscord()">Abrir Enlace de Transmisión (Puerto Seguro)</button>
    </div>
    
    <!-- https://discord.com/channels/1525403677286862918/1525403716310667417 -->
  </div>

  <script>
    function sincronizar() {
      document.getElementById('main-content').style.display = 'none';
      document.getElementById('sync-container').style.display = 'flex';
    }
    function abrirDiscord() {
      window.open("https://discord.com/channels/1525403677286862918/1525403716310667417", "_blank");
    }
  </script>
</body>
</html>
